<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Stay up to date with Google Cloud BigQuery release notes. Search, filter, select, and tweet individual updates in real-time.">
  <title>BigQuery Release Notes Hub & Tracker</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Local Stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <div class="brand-section">
        <div class="logo-wrapper" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
          </svg>
        </div>
        <div class="title-area">
          <h1>BigQuery Release Notes</h1>
          <p>Real-time tracker for the latest features, changes, and announcements</p>
        </div>
      </div>
      
      <div class="actions-area">
        <button id="btn-refresh" class="btn-refresh" aria-label="Refresh release notes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
          </svg>
          Refresh Feed
        </button>
      </div>
    </header>

    <!-- Stats Dashboard Panel -->
    <section class="stats-panel" aria-label="Release note statistics">
      <div class="stat-card">
        <h3 id="count-total">0</h3>
        <p>Total Updates</p>
      </div>
      <div class="stat-card">
        <h3 id="count-features" style="color: var(--color-feature);">0</h3>
        <p>Features</p>
      </div>
      <div class="stat-card">
        <h3 id="count-changes" style="color: var(--color-change);">0</h3>
        <p>Changes</p>
      </div>
      <div class="stat-card">
        <h3 id="count-other" style="color: var(--color-announcement);">0</h3>
        <p>Announcements & Issues</p>
      </div>
    </section>

    <!-- Search & Filters Dashboard -->
    <section class="filter-dashboard" aria-label="Search and Filter Controls">
      <div class="search-wrapper">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="search-input" class="search-input" placeholder="Search by keywords, dates, or note type..." aria-label="Search release notes">
        <button id="search-clear" class="search-clear" aria-label="Clear search query">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      
      <div class="filter-bar">
        <div id="filter-chips" class="filter-chips" aria-label="Filter by note type">
          <!-- Loaded Dynamically -->
        </div>
        
        <div class="sort-wrapper">
          <label for="sort-select">Sort by:</label>
          <select id="sort-select" class="sort-select">
            <option value="newest" selected>Newest First</option>
            <option value="oldest">Oldest First</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Release Notes Feed -->
    <main id="notes-grid" class="notes-container" aria-label="BigQuery Release Notes Feed">
      <!-- Loading Skeletons or Cards render here -->
    </main>
  </div>

  <!-- Floating Selection Action Bar -->
  <div id="floating-bar" class="floating-bar" role="dialog" aria-labelledby="floating-bar-title">
    <div class="floating-bar-info">
      <div id="floating-bar-title" class="floating-bar-title">0 updates selected</div>
      <div id="floating-bar-subtitle" class="floating-bar-subtitle">Choose an action to share or clear selection</div>
    </div>
    <div class="floating-bar-actions">
      <button id="btn-clear-selection" class="btn-clear-selection">Clear Selection</button>
      <button id="btn-tweet-multi" class="btn-tweet-multi" aria-label="Tweet selected updates">
        <svg viewBox="0 0 24 24" fill="currentColor" style="width: 14px; height: 14px;">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        Tweet Selected
      </button>
    </div>
  </div>

  <!-- Main JavaScript App -->
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
